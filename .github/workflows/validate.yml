name: Validate Store

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate store catalog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Store
        uses: actions/checkout@v4
        with:
          path: Store

      - name: Checkout FreeSynergy.Node
        uses: actions/checkout@v4
        with:
          repository: FreeSynergy/Node
          path: Node

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Node/validator/target
          key: ubuntu-validate-cargo-${{ hashFiles('Node/validator/Cargo.lock') }}
          restore-keys: ubuntu-validate-cargo-

      - name: Build fsn-store-validator
        working-directory: Node/validator
        run: cargo build --release

      - name: Validate node catalog
        run: Node/validator/target/release/fsn-store-validator Store node
