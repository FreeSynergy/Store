[field_help]
"name"        = "অনন্য সংক্ষিপ্ত নাম। শুধু ছোট হাতের অক্ষর, সংখ্যা এবং হাইফেন। ফাইল এবং কন্টেইনারের নামের জন্য ব্যবহৃত হয়।"
"domain"      = "http:// ছাড়া প্রধান ডোমেন। ওয়াইল্ডকার্ড সম্ভব: *.উদাহরণ.com। উপডোমেন স্বয়ংক্রিয়ভাবে উদ্ভূত হয়।"
"description" = "ঐচ্ছিক বিবরণ। বহু-লাইন ইনপুট সম্ভব। প্রকল্প ওভারভিউতে দেখানো হয়।"
"email"       = "Let's Encrypt (ACME)-এর জন্য ইমেল ঠিকানা। সার্টিফিকেট সমস্যার ক্ষেত্রে যোগাযোগ করা হয়।"
"acme_email"  = "Let's Encrypt (ACME)-এর জন্য ইমেল ঠিকানা। সার্টিফিকেট সমস্যার ক্ষেত্রে যোগাযোগ করা হয়।"
"address"     = "হোস্টের IPv4 ঠিকানা বা FQDN। উদাহরণ: 192.168.1.10 বা সার্ভার.উদাহরণ.com"
"subdomain"   = "এই ইনস্ট্যান্সের উপডোমেন। নাম থেকে স্বয়ংক্রিয়ভাবে উদ্ভূত। ফলাফল: উপডোমেন.ডোমেন.tld"
"install_dir" = "ডেটা এবং কনফিগারেশনের জন্য বেস ডিরেক্টরি। না থাকলে তৈরি করা হয়।"
"ssh_port"    = "ডিফল্ট 22। নিরাপত্তার কারণে অন্যান্য পোর্ট সম্ভব, যেমন 2222।"