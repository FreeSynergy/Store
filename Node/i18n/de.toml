[field_help]
"name"        = "Eindeutiger Kurzname. Nur Kleinbuchstaben, Ziffern und Bindestriche. Wird für Dateinamen und Container-Namen verwendet."
"domain"      = "Hauptdomain ohne http://. Wildcards möglich: *.example.com. Subdomains werden automatisch abgeleitet."
"description" = "Optionale Beschreibung. Mehrzeilige Eingabe möglich. Wird in der Projektübersicht angezeigt."
"email"       = "E-Mail-Adresse für Let's Encrypt (ACME). Wird bei Zertifikatsproblemen kontaktiert."
"acme_email"  = "E-Mail-Adresse für Let's Encrypt (ACME). Wird bei Zertifikatsproblemen kontaktiert."
"address"     = "IPv4-Adresse oder FQDN des Hosts. Beispiel: 192.168.1.10 oder server.example.com"
"subdomain"   = "Subdomain dieser Instanz. Wird automatisch aus dem Name abgeleitet. Ergibt: subdomain.domain.tld"
"install_dir" = "Basisverzeichnis für Daten und Konfiguration. Wird angelegt falls nicht vorhanden."
"ssh_port"    = "Standard ist 22. Andere Ports für Sicherheit möglich, z.B. 2222."
