[field_help]
"name"        = "Nombre corto único. Solo letras minúsculas, números y guiones. Se usa para nombres de archivos y contenedores."
"domain"      = "Dominio principal sin http://. Se permiten comodines: *.ejemplo.com. Los subdominios se derivan automáticamente."
"description" = "Descripción opcional. Se permite entrada multilínea. Se muestra en la vista general del proyecto."
"email"       = "Dirección de correo para Let's Encrypt (ACME). Se contacta en caso de problemas con certificados."
"acme_email"  = "Dirección de correo para Let's Encrypt (ACME). Se contacta en caso de problemas con certificados."
"address"     = "Dirección IPv4 o FQDN del host. Ejemplo: 192.168.1.10 o servidor.ejemplo.com"
"subdomain"   = "Subdominio de esta instancia. Se deriva automáticamente del nombre. Resultado: subdominio.dominio.tld"
"install_dir" = "Directorio base para datos y configuración. Se crea si no existe."
"ssh_port"    = "El valor predeterminado es 22. Otros puertos son posibles por seguridad, ej. 2222."