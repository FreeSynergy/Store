[field_help]
"name"        = "Nom court unique. Uniquement lettres minuscules, chiffres et traits d'union. Utilisé pour les noms de fichiers et de conteneurs."
"domain"      = "Domaine principal sans http://. Les jokers sont possibles : *.exemple.com. Les sous-domaines sont dérivés automatiquement."
"description" = "Description optionnelle. Saisie multiligne possible. Affichée dans l'aperçu du projet."
"email"       = "Adresse e-mail pour Let's Encrypt (ACME). Contactée en cas de problème de certificat."
"acme_email"  = "Adresse e-mail pour Let's Encrypt (ACME). Contactée en cas de problème de certificat."
"address"     = "Adresse IPv4 ou FQDN de l'hôte. Exemple : 192.168.1.10 ou serveur.exemple.com"
"subdomain"   = "Sous-domaine de cette instance. Dérivé automatiquement du nom. Donne : sous-domaine.domaine.tld"
"install_dir" = "Répertoire de base pour les données et la configuration. Créé s'il n'existe pas."
"ssh_port"    = "La valeur par défaut est 22. D'autres ports sont possibles pour la sécurité, p.ex. 2222."