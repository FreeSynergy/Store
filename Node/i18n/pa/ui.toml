[field_help]
name = 'ਵਿਲੱਖਣ ਛੋਟਾ ਨਾਂ। ਸਿਰਫ ਛੋਟੇ ਅੱਖਰ, ਅੰਕ ਅਤੇ ਹਾਈਫਨ। ਫਾਈਲ ਅਤੇ ਕੰਟੇਨਰ ਨਾਂਵਾਂ ਲਈ ਵਰਤਿਆ ਜਾਂਦਾ ਹੈ।'
domain = 'http:// ਤੋਂ ਬਿਨਾਂ ਮੁੱਖ ਡੋਮੇਨ। ਵਾਈਲਡਕਾਰਡ ਸੰਭਵ: *.ਉਦਾਹਰਣ.com। ਉਪ-ਡੋਮੇਨ ਆਪਣੇ ਆਪ ਲਿਆਏ ਜਾਂਦੇ ਹਨ।'
description = 'ਵਿਕਲਪਿਕ ਵੇਰਵਾ। ਬਹੁ-ਕਤਾਰ ਇਨਪੁਟ ਸੰਭਵ। ਪ੍ਰੋਜੈਕਟ ਸੰਖੇਪ ਜਾਣਕਾਰੀ ਵਿੱਚ ਵੇਖਾਇਆ ਜਾਂਦਾ ਹੈ।'
email = "Let's Encrypt (ACME) ਲਈ ਈਮੇਲ ਐਡਰੈਸ। ਸਰਟੀਫਿਕੇਟ ਸਮੱਸਿਆਵਾਂ ਦੇ ਮਾਮਲੇ ਵਿੱਚ ਸੰਪਰਕ ਕੀਤਾ ਜਾਂਦਾ ਹੈ।"
acme_email = "Let's Encrypt (ACME) ਲਈ ਈਮੇਲ ਐਡਰੈਸ। ਸਰਟੀਫਿਕੇਟ ਸਮੱਸਿਆਵਾਂ ਦੇ ਮਾਮਲੇ ਵਿੱਚ ਸੰਪਰਕ ਕੀਤਾ ਜਾਂਦਾ ਹੈ।"
address = 'ਹੋਸਟ ਦਾ IPv4 ਐਡਰੈਸ ਜਾਂ FQDN। ਉਦਾਹਰਣ: 192.168.1.10 ਜਾਂ ਸਰਵਰ.ਉਦਾਹਰਣ.com'
