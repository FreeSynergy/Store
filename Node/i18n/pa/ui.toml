install_dir = 'ਡਾਟਾ ਅਤੇ ਕੌਂਫਿਗਰੇਸ਼ਨ ਲਈ ਅਧਾਰ ਡਾਇਰੈਕਟਰੀ। ਜੇ ਮੌਜੂਦ ਨਾ ਹੋਵੇ ਤਾਂ ਬਣਾਈ ਜਾਂਦੀ ਹੈ।'
ssh_port = 'ਡਿਫੌਲਟ 22 ਹੈ। ਸੁਰੱਖਿਆ ਕਾਰਨਾਂ ਕਰਕੇ ਹੋਰ ਪੋਰਟ ਸੰਭਵ ਹਨ, ਜਿਵੇਂ 2222।'
