"name"        = "Nome curto único. Apenas letras minúsculas, números e hífens. Usado para nomes de arquivos e contentores."
"domain"      = "Domínio principal sem http://. Curingas possíveis: *.exemplo.com. Subdomínios são derivados automaticamente."
"description" = "Descrição opcional. Entrada multilinha possível. Exibida na visão geral do projeto."
"email"       = "Endereço de email para Let's Encrypt (ACME). Contactado em caso de problemas com certificados."
"acme_email"  = "Endereço de email para Let's Encrypt (ACME). Contactado em caso de problemas com certificados."
"address"     = "Endereço IPv4 ou FQDN do host. Exemplo: 192.168.1.10 ou servidor.exemplo.com"
"subdomain"   = "Subdomínio desta instância. Derivado automaticamente do nome. Resulta: subdomínio.domínio.tld"
"install_dir" = "Diretório base para dados e configuração. Criado se não existir."
"ssh_port"    = "O padrão é 22. Outras portas são possíveis para segurança, ex. 2222."