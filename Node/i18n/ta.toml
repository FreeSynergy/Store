[field_help]
"name"        = "தனித்துவமான குறுகிய பெயர். சிறிய எழுத்துக்கள், எண்கள் மற்றும் இணைப்புக் கோடுகள் மட்டுமே. கோப்பு மற்றும் கொள்கலன் பெயர்களுக்குப் பயன்படுத்தப்படுகிறது."
"domain"      = "http:// இல்லாத முதன்மை டொமைன். வைல்டு கார்டுகள் சாத்தியம்: *.உதாரணம்.com. துணை டொமைன்கள் தானாகப் பெறப்படுகின்றன."
"description" = "விரும்பினால் விளக்கம். பல வரி உள்ளீடு சாத்தியம். திட்ட மேலோட்டத்தில் காட்டப்படும்."
"email"       = "Let's Encrypt (ACME) க்கான மின்னஞ்சல் முகவரி. சான்றிதழ் சிக்கல்கள் ஏற்பட்டால் தொடர்பு கொள்ளப்படும்."
"acme_email"  = "Let's Encrypt (ACME) க்கான மின்னஞ்சல் முகவரி. சான்றிதழ் சிக்கல்கள் ஏற்பட்டால் தொடர்பு கொள்ளப்படும்."
"address"     = "ஹோஸ்டின் IPv4 முகவரி அல்லது FQDN. எடுத்துக்காட்டு: 192.168.1.10 அல்லது சர்வர்.உதாரணம்.com"
"subdomain"   = "இந்த நிகழ்வின் துணை டொமைன். பெயரிலிருந்து தானாகப் பெறப்பட்டது. முடிவு: துணை டொமைன்.டொமைன்.tld"
"install_dir" = "தரவு மற்றும் கட்டமைப்புக்கான அடிப்படை கோப்பகம். இல்லையெனில் உருவாக்கப்படும்."
"ssh_port"    = "இயல்புநிலை 22. பாதுகாப்பு காரணங்களுக்காக மற்ற போர்ட்கள் சாத்தியம், எ.கா. 2222."