[field_help]
"name"        = "Orúkọ kúkúrú aláìlẹ́gbẹ́. Àwọn lẹ́tà kéékèèké, nọ́ńbà àti àmì ìsopọ̀ nikan. A ń lò ó fún àwọn orúkọ fáìlì àti ẹ̀rọ ìkópa."
"domain"      = "Òpó àkọ́kọ́ láìsí http://. Ó ṣeé ṣe fún àwọn àmì ìdánilójú: *.àpẹẹrẹ.com. Àwọn òpó abẹ́lẹ̀ a máa jáde lọ́nà àdáaṣe."
"description" = "Àpèjúwe ìyànfẹ́. Ó ṣeé ṣe láti fi ọ̀pọ̀ ìlà sí i. A ó fi hàn nínú àkọ́bẹ̀rẹ̀ iṣẹ́."
"email"       = "Àdírẹ́sì imeeli fún Let's Encrypt (ACME). A óò kan sí i tí àwọn ìṣòro ìjẹ́rísí bá ṣẹlẹ̀."
