# Module class definition – maps to modules/observability/openobserver/openobserver.toml
#
# Field order (MANDATORY per RULES.md):
#   module → vars → load → container → environment → setup
#
# NOTE: For OIDC with the OSS edition, use Zentinel Auth-Agent as
# forward-auth proxy in front of OpenObserve.

[module]
name        = "openobserver"
alias       = ["o2", "logs", "monitoring"]
type        = "observability"
author      = "FreeSynergy.Node"
version     = "0.0.1"
tags        = ["observability", "logs", "metrics", "traces", "monitoring"]
description = "OpenObserve – observability platform for logs, metrics and traces"
website     = "https://openobserve.ai"
repository  = "https://github.com/openobserve/openobserve"
port        = 5080

health_path = "/healthz"
health_port = 5080

[module.constraints]
per_host = 1
per_ip   = 1

[vars]
config_dir = "{{ project_root }}/data/{{ instance_name }}"

[load.services.kanidm]

[container]
name      = "{{ instance_name }}"
image     = "public.ecr.aws/zinclabs/openobserve"
image_tag = "latest"
volumes   = [
    "{{ module_vars.config_dir }}/data:/data:Z",
]

[container.healthcheck]
cmd          = "curl -fsS http://localhost:5080/healthz || exit 1"
interval     = "30s"
timeout      = "5s"
retries      = 3
start_period = "30s"

[environment]
# Admin credentials (first start only)
ZO_ROOT_USER_EMAIL    = "{{ vault_openobserver_admin_email | default('admin@' + project_domain) }}"
ZO_ROOT_USER_PASSWORD = "{{ vault_openobserver_admin_password }}"

# Data storage
ZO_DATA_DIR           = "/data"

# Network
ZO_HTTP_PORT          = "{{ module.port }}"
ZO_HTTP_ADDR          = "0.0.0.0"
ZO_GRPC_PORT          = "{{ openobserver_grpc_port | default('5081') }}"

# Telemetry (disable phoning home)
ZO_TELEMETRY          = "false"
ZO_TELEMETRY_URL      = ""

# Performance
ZO_WAL_MEMORY_MODE_ENABLED = "{{ openobserver_wal_memory | default('true') }}"

# Log level
RUST_LOG              = "{{ openobserver_log_level | default('info') }}"

[[setup.fields]]
key         = "vault_openobserver_admin_email"
label       = "OpenObserve admin email"
field_type  = "email"
description = "Email address for the initial admin account."
skip_if_set = true

[[setup.fields]]
key           = "vault_openobserver_admin_password"
label         = "OpenObserve admin password"
field_type    = "secret"
auto_generate = true

[contract]
[[contract.routes]]
id          = "main"
path        = "/"
strip       = false
description = "OpenObserve observability dashboard"
