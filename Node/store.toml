# FreeSynergy Store — Root Manifest
#
# Location Descriptor: the single entry point for the FSN store.
# Points to all available catalogs with their integrity hashes.
#
# Chain of Trust:
#   [Binary] pinned Ed25519 public key
#     → [Fetch] store.toml  (Ed25519 signature in store.toml.sig)
#       → [Fetch] catalog/*.toml  (SHA256 verified against this file)
#         → [Fetch] individual files  (SHA256 verified against catalog)
#
# Pattern: Chain of Trust (security), Composite (manifest → catalogs → entries)
#
# store.toml.sig  — Ed25519 signature of this file (generated on release)
# public_key      — base64-encoded Ed25519 public key (also pinned in FSN binary)
#
# URL: https://raw.githubusercontent.com/FreeSynergy/Store/main/Node/store.toml

[store]
name       = "FreeSynergy Official Store"
id         = "freesynergy-official"
version    = 1
public_key = "TODO:ed25519-public-key-base64"   # generated with: fsn store keygen

