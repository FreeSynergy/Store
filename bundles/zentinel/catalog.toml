# Zentinel Bundle — Reverse Proxy + Control Plane

[package]
id               = "zentinel"
name             = "Zentinel"
type             = "bundle"
version          = "0.1.0"
summary          = "Reverse proxy bundle — Zentinel server and control plane for FreeSynergy routing"
description      = "The Zentinel bundle installs the Zentinel reverse proxy and its control plane together. Zentinel handles all inbound HTTPS routing for FreeSynergy services, terminates TLS, and forwards requests to the appropriate service based on routing rules managed by the control plane."
description_file = "en/description.ftl"
icon             = "icon.svg"
tags             = ["proxy", "reverse-proxy", "tls", "routing", "zentinel", "bundle"]
author           = "FreeSynergy"
license          = "MIT"

[provides]
capabilities = ["reverse-proxy", "tls-termination", "routing"]

[bundle]
components = [
    { id = "zentinel",               catalog = "../../apps/zentinel/catalog.toml" },
    { id = "zentinel-control-plane", catalog = "../../apps/zentinel-control-plane/catalog.toml" },
]
