# FreeSynergy Store — Root Catalog
#
# This is the namespace index. StoreClient reads this first to discover
# all available namespaces and build the Store UI sidebar.
#
# Layout:
#   init/         — bootstrap package (not installable, only downloadable)
#   bundles/      — root-level bundles: reference packages by id, no binaries
#   themes/       — root-level themes: Bundle subtype with fixed design structure
#   packages/     — all installable packages (apps, containers, widgets, ...)

[catalog]
id      = "freesynergy-store"
name    = "FreeSynergy Store"
icon    = "icon.svg"
summary = "The official FreeSynergy package registry"
version = "1.0.0"

# ── Special root entries ───────────────────────────────────────────────────────

[[namespaces]]
id      = "init"
name    = "Init"
type    = "bootstrap"
catalog = "init/catalog.toml"

[[namespaces]]
id      = "bundles"
name    = "Bundles"
type    = "bundle"
catalog = "bundles/catalog.toml"

[[namespaces]]
id      = "themes"
name    = "Themes"
type    = "theme"
catalog = "themes/catalog.toml"

# ── Package namespaces ─────────────────────────────────────────────────────────

[[namespaces]]
id      = "apps"
name    = "Applications"
type    = "app"
catalog = "packages/apps/catalog.toml"

[[namespaces]]
id      = "containers"
name    = "Containers"
type    = "container"
catalog = "packages/containers/catalog.toml"

[[namespaces]]
id      = "widgets"
name    = "Widgets"
type    = "widget"
catalog = "packages/widgets/catalog.toml"

[[namespaces]]
id      = "i18n"
name    = "Languages"
type    = "language"
catalog = "packages/i18n/catalog.toml"

[[namespaces]]
id      = "icons"
name    = "Icon Sets"
type    = "icon_set"
catalog = "packages/icons/catalog.toml"

[[namespaces]]
id      = "bots"
name    = "Bots"
type    = "bot"
catalog = "packages/bots/catalog.toml"

[[namespaces]]
id      = "tasks"
name    = "Tasks"
type    = "task"
catalog = "packages/tasks/catalog.toml"

[[namespaces]]
id      = "bridges"
name    = "Bridges"
type    = "bridge"
catalog = "packages/bridges/catalog.toml"

[[namespaces]]
id      = "repos"
name    = "Repositories"
type    = "repo"
catalog = "packages/repos/catalog.toml"
