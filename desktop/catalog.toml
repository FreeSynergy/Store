category    = "managers.theme"
version     = "1.0.0"
description = "Browse and apply desktop color themes."
icon        = "we10x/apps/scalable/preferences-desktop-plasma-theme.svg"
license     = "MIT"
author      = "Kal El"
tags        = ["manager", "theme", "appearance", "builtin"]

[[packages]]
