[[packages]]
id          = "manager-container-app"
name        = "Container App Manager"
kind        = "manager"
category    = "managers.container_app"
version     = "1.0.0"
description = "Manage Podman container apps and services."
icon        = "we10x/apps/scalable/docker.svg"
