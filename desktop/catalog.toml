category    = "apps.demo"
version     = "0.1.0"
description = "A minimal demo app — shows how native FreeSynergy apps appear in the Store. Not yet functional."
icon        = "we10x/apps/scalable/application-default-icon.svg"
license     = "MIT"
author      = "Kal El"
tags        = ["demo", "placeholder", "app"]
