# FreeSynergy Store — Desktop Catalog
#
# URL: https://raw.githubusercontent.com/FreeSynergy/Store/main/desktop/catalog.toml
#
# Lists all packages distributed via the Desktop Store:
#   - Manager Bundle (groups all built-in desktop managers)
#   - Individual Managers (built-in desktop components)
#   - Demo/placeholder Apps
#
# Field order (packages): id → name → kind → category → version → description
#   → icon → license → author → tags

[catalog]
project      = "Desktop"
generated_at = "2026-03-19T00:00:00Z"
version      = "1.0.0"

# ── Manager Bundle ─────────────────────────────────────────────────────────────
# All built-in managers are grouped under this single bundle entry.
# Individual managers are discoverable via the bundle's capabilities list.

[[packages]]
id           = "bundle-managers"
name         = "Manager Bundle"
kind         = "bundle"
category     = "bundles.managers"
version      = "1.0.0"
description  = "All built-in FreeSynergy desktop managers — language, theme, icons, container apps, and bots."
icon         = "we10x/apps/scalable/extension-manager.svg"
license      = "MIT"
author       = "Kal El"
tags         = ["bundle", "managers", "builtin"]
capabilities = [
  "manager-language",
  "manager-theme",
  "manager-icons",
  "manager-container-app",
  "manager-bots",
]

# ── Managers ──────────────────────────────────────────────────────────────────

[[packages]]
id          = "manager-language"
name        = "Language Manager"
kind        = "manager"
category    = "managers.language"
version     = "1.0.0"
description = "Install and switch interface language packs."
icon        = "we10x/apps/scalable/preferences-desktop-locale.svg"
license     = "MIT"
author      = "Kal El"
tags        = ["manager", "language", "i18n", "builtin"]

[[packages]]
