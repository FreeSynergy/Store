# Module class definition — maps to node/modules/ai/mistral/mistral.toml
#
# This module deploys the Mistral.rs app as a background service.
# The binary is distributed via the root catalog (id: "mistral") and
# installed system-wide — not downloaded again here.
#
# Field order (MANDATORY per RULES.md):
#   module → vars → load → binary → service → healthcheck → setup

[module]
name         = "mistral"
alias        = ["llm", "inference"]
type         = "ai"
kind         = "binary"
author       = "Kal El"
license      = "MIT"
version      = "0.0.1"
tags         = ["ai", "llm", "inference", "openai-api", "local-ai", "isq", "gguf", "cpu"]
description  = "Mistral.rs LLM inference server as a background service — OpenAI-compatible API, ISQ quantization, CPU and Metal support"
website      = "https://github.com/FreeSynergy/mistral.rs"
repository   = "https://github.com/FreeSynergy/mistral.rs"
port         = 1234
health_path  = "/health"
health_port  = 1234

[module.constraints]
# Only one inference server per host makes sense for CPU deployments.
per_host = 1

[vars]
data_dir   = "{{ project_root }}/data/{{ instance_name }}"
models_dir = "{{ module_vars.data_dir }}/models"
log_file   = "{{ module_vars.data_dir }}/mistral.log"
pid_file   = "{{ module_vars.data_dir }}/mistral.pid"

[load.modules]
[load.services]

[binary]
# References the Mistral.rs app from the root catalog — installed on first use.
# No separate download: FSN checks if "mistral" app is installed and installs it if not.
app         = "mistral"
install_dir = "{{ project_root }}/bin/mistral"

[service]
# mistralrs serve -p <port> -m <model_id> [--isq <type>]
# model_id can be a HuggingFace repo ID (auto-downloaded + cached) or a local path to a .gguf file.
# ISQ (In-Situ Quantization): mistral.rs quantizes the model in-memory — no pre-quantized file needed.
cmd         = "{{ binary.install_dir }}/mistralrs serve --port {{ mistral_port }} --host {{ mistral_host }} --max-seqs {{ mistral_max_seqs }} -m {{ mistral_model_id }}{{ ' --isq ' ~ mistral_isq if mistral_isq else '' }}"
pid_file    = "{{ module_vars.pid_file }}"
log_file    = "{{ module_vars.log_file }}"
stop_signal = "SIGTERM"
restart     = "on-failure"

[healthcheck]
cmd          = "curl -fsS http://localhost:{{ mistral_port }}/health || exit 1"
interval     = "30s"
timeout      = "10s"
retries      = 3
start_period = "120s"

# ── Variables ─────────────────────────────────────────────────────────────────

[[variables]]
name        = "mistral_port"
description = "TCP port the inference server listens on. 1234 is the default — used by Continue.dev and all OpenAI-compatible clients."
required    = true
default     = "1234"

[[variables]]
name        = "mistral_host"
description = "IP address to bind on. '127.0.0.1' for local-only access (recommended). '0.0.0.0' to expose via reverse proxy."
required    = true
default     = "127.0.0.1"

[[variables]]
name        = "mistral_model_id"
description = "HuggingFace model ID or local path. ISQ mode (recommended): use a HF repo ID such as 'Qwen/Qwen3-4B' and set mistral_isq. GGUF mode: set to the absolute path of a .gguf file and leave mistral_isq empty."
required    = true
default     = "Qwen/Qwen3-4B"

[[variables]]
name        = "mistral_isq"
description = "In-Situ Quantization type. mistral.rs downloads the model from HuggingFace and quantizes it in-memory — no pre-quantized file needed. Recommended: 'q4k' (~3 GB RAM for 4B). Leave empty when using a pre-quantized .gguf file."
default     = "q4k"

[[variables]]
name        = "mistral_max_seqs"
description = "Maximum number of concurrent inference sequences. 4 is a sensible default for interactive use on a 16 GB machine."
default     = "4"

# ── Setup wizard fields ───────────────────────────────────────────────────────

[setup]

[[setup.fields]]
key         = "project_root"
label       = "Data Directory"
description = "Base path where the binary is installed and model cache is stored. Single-user default: ~/.local/share/fsn — server default: /srv/fsn"
field_type  = "string"
default     = "~/.local/share/fsn"
skip_if_set = true

[[setup.fields]]
key         = "mistral_model_id"
label       = "Model ID"
description = "HuggingFace model ID (e.g. Qwen/Qwen3-4B) or absolute path to a .gguf file. The model is downloaded and cached on first start."
field_type  = "string"
default     = "Qwen/Qwen3-4B"
skip_if_set = false

[[setup.fields]]
key         = "mistral_isq"
label       = "ISQ Quantization"
description = "Quantization type for ISQ mode. 'q4k' uses ~3 GB RAM for a 4B model. Leave empty when using a .gguf file."
field_type  = "string"
default     = "q4k"
skip_if_set = false

[[setup.fields]]
key         = "mistral_max_seqs"
label       = "Max Concurrent Sequences"
description = "Inference concurrency limit. 4 is recommended for 16 GB RAM."
field_type  = "string"
default     = "4"
skip_if_set = false

[[setup.fields]]
key         = "service_domain"
label       = "Domain (optional)"
description = "Domain for proxy access, e.g. ai.example.com. Leave empty for local-only use at localhost:1234."
field_type  = "string"
default     = ""
skip_if_set = true

# ── Proxy contract ────────────────────────────────────────────────────────────

[contract]
upstream_tls = false

[[contract.routes]]
id          = "api"
path        = "/"
strip       = false
description = "OpenAI-compatible REST API — /v1/chat/completions, /v1/completions, /v1/embeddings"
