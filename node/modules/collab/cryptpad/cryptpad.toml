[module]
name        = "cryptpad"
alias       = ["collab", "pad"]
type        = "collab"
author      = "Kal El"
license      = "MIT"
version     = "0.0.1"
tags        = ["collab", "office", "encrypted"]
description = "CryptPad end-to-end encrypted collaborative office suite"
website     = "https://cryptpad.org"
repository  = "https://github.com/cryptpad/cryptpad"
port        = 3000
health_path = "/"
health_port = 3000

# CryptPad requires TWO proxy entries: main + sandbox domain
# Zentinel must route both to this container

[module.constraints]

[vars]
config_dir     = "{{ project_root }}/data/{{ instance_name }}"
sandbox_domain = "sandbox.{{ project_domain }}"

[load.modules]
[load.services.kanidm]

[container]
name      = "{{ instance_name }}"
image     = "docker.io/cryptpad/cryptpad"
image_tag = "latest"
volumes   = [
  "{{ module_vars.config_dir }}/blob:/cryptpad/blob:Z",
  "{{ module_vars.config_dir }}/block:/cryptpad/block:Z",
  "{{ module_vars.config_dir }}/customize:/cryptpad/customize:Z",
  "{{ module_vars.config_dir }}/data:/cryptpad/data:Z",
  "{{ module_vars.config_dir }}/datastore:/cryptpad/datastore:Z",
  "{{ module_vars.config_dir }}/config/config.js:/cryptpad/config/config.js:ro,Z",
  "{{ module_vars.config_dir }}/config/sso.js:/cryptpad/lib/plugins/sso/config.js:ro,Z",
]

[container.healthcheck]
cmd          = "curl -fsS http://localhost:3000/ || exit 1"
interval     = "30s"
timeout      = "5s"
retries      = 3
start_period = "45s"

[environment]
CPAD_MAIN_DOMAIN      = "https://{{ service_domain }}"
CPAD_SANDBOX_DOMAIN   = "https://{{ vars.sandbox_domain }}"
CPAD_HTTP2_DISABLE    = "true"
CPAD_REALIP_HEADER    = "X-Forwarded-For"
CPAD_REALIP_RECURSIVE = "on"
CPAD_TRUSTED_PROXY    = "{{ cryptpad_trusted_proxy | default('10.0.0.0/8') }}"

# Most config is in config.js – generated by deploy-setup hook

[[variables]]
name        = "CPAD_MAIN_DOMAIN"
description = "Full HTTPS URL of the main CryptPad domain (e.g. 'https://pad.example.com'). Used for Content-Security-Policy and well-known configuration. Must match the proxy route."
required    = true

[[variables]]
name        = "CPAD_SANDBOX_DOMAIN"
description = "Full HTTPS URL of the sandbox domain (e.g. 'https://sandbox.example.com'). CryptPad runs document editors in an iframe on this isolated origin to prevent XSS. Requires a second proxy route."
required    = true

[[variables]]
name        = "CPAD_HTTP2_DISABLE"
description = "Disable HTTP/2 between the container and the reverse proxy. Set to 'true' when the proxy terminates TLS and speaks HTTP/1.1 upstream (standard Zentinel setup)."
default     = "true"

[[variables]]
name        = "CPAD_REALIP_HEADER"
description = "HTTP header the reverse proxy uses to forward the original client IP. 'X-Forwarded-For' is the standard; used for rate limiting and audit logs."
default     = "X-Forwarded-For"

[[variables]]
name        = "CPAD_REALIP_RECURSIVE"
description = "Whether to resolve chained X-Forwarded-For headers recursively ('on') or take the first value ('off'). Use 'on' when traffic passes through multiple trusted proxies."
default     = "on"

[[variables]]
name        = "CPAD_TRUSTED_PROXY"
description = "CIDR range of trusted reverse proxy addresses. IPs in this range are allowed to set the real-IP header. '10.0.0.0/8' covers all Podman internal networks."
default     = "10.0.0.0/8"

[setup]

[[setup.fields]]
key         = "cryptpad_admin_email"
label       = "CryptPad administrator email address"
field_type  = "email"
description = "Used to display the admin contact in CryptPad's footer."

[contract]
[[contract.routes]]
id          = "main"
path        = "/"
strip       = false
description = "CryptPad collaborative editor"
