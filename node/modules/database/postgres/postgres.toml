[module]
name         = "postgres"
alias        = []
type         = "database"
capabilities = ["database_postgres"]
author      = "Kal El"
license      = "MIT"
version     = "0.0.1"
tags        = ["database", "sql"]
description = "PostgreSQL database server"
website     = "https://www.postgresql.org"
repository  = "https://github.com/postgres/postgres"
port        = 5432

[module.constraints]
locality = "same_host"

[vars]
config_dir = "{{ project_root }}/data/{{ instance_name }}"
db_name    = "{{ postgres_db_name | default(parent_instance_name) }}"
db_user    = "{{ postgres_db_user | default(parent_instance_name) }}"

[load.modules]
[load.services]

[container]
name      = "{{ instance_name }}"
image     = "docker.io/library/postgres"
image_tag = "18-alpine"
volumes   = ["{{ module_vars.config_dir }}/data:/var/lib/postgresql:Z"]

[container.healthcheck]
cmd          = "pg_isready -h localhost -U $POSTGRES_USER"
interval     = "15s"
timeout      = "5s"
retries      = 5
start_period = "30s"

[environment]
POSTGRES_DB               = "{{ module_vars.db_name }}"
POSTGRES_USER             = "{{ module_vars.db_user }}"
POSTGRES_PASSWORD         = "{{ vault_db_password }}"
POSTGRES_INITDB_ARGS      = "{{ postgres_initdb_args | default('--auth-host=scram-sha-256') }}"
POSTGRES_HOST_AUTH_METHOD = "scram-sha-256"

[[variables]]
name        = "POSTGRES_DB"
description = "Name of the database created on first start. Defaults to the parent service's instance name (e.g. 'forgejo'). Must match what the parent service is configured to connect to."
required    = true

[[variables]]
name        = "POSTGRES_USER"
description = "Superuser name created on first start. Defaults to the parent service's instance name. The parent service connects with this user."
required    = true

[[variables]]
name        = "POSTGRES_PASSWORD"
description = "Password for the database superuser. Auto-generated and stored in vault. The parent service reads this from the vault at deploy time."
secret      = true
required    = true

[[variables]]
name        = "POSTGRES_INITDB_ARGS"
description = "Extra arguments passed to initdb during the first start. '--auth-host=scram-sha-256' enforces modern password hashing for all client connections — do not remove."
default     = "--auth-host=scram-sha-256"

[[variables]]
name        = "POSTGRES_HOST_AUTH_METHOD"
description = "Authentication method for host connections. 'scram-sha-256' is the current best practice. Changing this to 'md5' or 'trust' reduces security significantly."
required    = true
default     = "scram-sha-256"

[[setup.fields]]
key           = "vault_db_password"
label         = "PostgreSQL database password"
field_type    = "secret"
auto_generate = true
