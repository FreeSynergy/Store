[module]
name         = "kanidm"
alias        = ["auth"]
types        = ["iam_provider"]
capabilities = ["iam_ldap", "iam_scim"]
author       = "Kal El"
license       = "MIT"
version      = "0.0.1"
tags         = ["iam", "identity", "oidc", "ldap", "scim", "webauthn"]
description = "Kanidm identity management server"
website     = "https://kanidm.com"
repository  = "https://github.com/kanidm/kanidm"
port        = 8443
health_path   = "/"
health_port   = 8443
health_scheme = "https"

[module.constraints]
# no limits

[module.federation]
enabled   = true
min_trust = 1

[vars]
config_dir = "{{ project_root }}/data/{{ instance_name }}"
domain     = "{{ service_domain }}"
origin     = "https://{{ module_vars.domain }}"

[load.modules]
[load.services]

[container]
name      = "{{ instance_name }}"
image     = "docker.io/kanidm/server"
image_tag = "latest"
volumes   = ["{{ module_vars.config_dir }}/data:/data:Z"]

[container.healthcheck]
cmd          = "kanidmd healthcheck -c /data/server.toml"
interval     = "30s"
timeout      = "5s"
retries      = 3
start_period = "30s"

[environment]

# No required secrets for kanidm – admin setup is done via kanidmd CLI on first start.
# Use [[setup.fields]] if you add custom vault_ vars in your instance config.

[setup]

[contract]
upstream_tls = true
[[contract.routes]]
id          = "main"
path        = "/"
strip       = false
description = "Kanidm web UI + REST API"
