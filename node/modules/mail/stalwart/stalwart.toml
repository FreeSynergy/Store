[module]
name        = "stalwart"
alias       = ["mail"]
type        = "mail"
capabilities = ["mail_jmap"]
author      = "Kal El"
license      = "MIT"
version     = "0.0.1"
tags        = ["mail", "smtp", "imap", "jmap", "caldav", "carddav"]
description = "Stalwart all-in-one mail and collaboration server"
website     = "https://stalw.art"
repository  = "https://github.com/stalwartlabs/stalwart"
port        = 443
health_path   = "/healthz"
health_port   = 443
health_scheme = "https"

[module.constraints]

[vars]
config_dir = "{{ project_root }}/data/{{ instance_name }}"

[load.modules]
[load.services.kanidm]

[container]
name      = "{{ instance_name }}"
image     = "docker.io/stalwartlabs/stalwart"
image_tag = "latest"
volumes   = ["{{ module_vars.config_dir }}/data:/opt/stalwart:Z"]

[container.healthcheck]
cmd          = "curl -fsS http://localhost:8080/healthz || exit 1"
interval     = "30s"
timeout      = "5s"
retries      = 3
start_period = "30s"

[environment]
# Stalwart uses config.toml + Web Admin for configuration.
# These env vars are only used on FIRST START for initialization.
STALWART_HOSTNAME = "{{ service_domain }}"
STALWART_DOMAINS  = "{{ project_domain }}"

# OIDC: configure via Web Admin UI after first start
#   Settings > Authentication > OIDC
#   Issuer URL: https://{{ services.kanidm.domain }}/oauth2/openid/stalwart
#   Client ID: stalwart

# DNS records for this module are defined in:
#   MX   priority=10  host={{ host_name }}.{{ project_domain }}
#   TXT  "v=spf1 mx -all"
#   SRV  _submission._tcp  587
#   SRV  _imaps._tcp       993

[[variables]]
name        = "STALWART_HOSTNAME"
description = "FQDN of this mail server (e.g. 'mail.example.com'). Used only during first-start initialization to set the server's EHLO hostname and TLS certificate domain. All further configuration is done via the Web Admin UI."
required    = true

[[variables]]
name        = "STALWART_DOMAINS"
description = "Comma-separated list of email domains this server accepts mail for (e.g. 'example.com'). Used only during first-start initialization. Additional domains can be added later via the Web Admin UI."
required    = true

[setup]

[[setup.fields]]
key         = "stalwart_admin_password"
label       = "Stalwart admin password"
field_type  = "secret"
auto_generate = true
description = "Password for the Stalwart web admin UI (https://mail.yourdomain/)"

[contract]
upstream_tls = true
[[contract.routes]]
id          = "webmail"
path        = "/"
strip       = false
description = "Stalwart webmail + admin UI"
