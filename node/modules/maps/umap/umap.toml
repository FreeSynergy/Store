# Module class definition – maps to modules/maps/umap/umap.toml
#
# Field order (MANDATORY per RULES.md):
#   module → vars → load → container → environment → setup
#
# NOTE: uMap requires PostGIS, not plain Postgres.
# The postgres sub-module should use the postgis/postgis image for this instance.

[module]
name        = "umap"
alias       = ["maps", "karten"]
type        = "maps"
author      = "Kal El"
license      = "MIT"
version     = "0.0.1"
tags        = ["maps", "openstreetmap", "geodata", "collaboration"]
description = "uMap – collaborative maps with OpenStreetMap layers"
website     = "https://umap-project.org"
repository  = "https://github.com/umap-project/umap"
port        = 8000

health_path = "/"
health_port = 8000

[module.constraints]
per_host = 1
per_ip   = 1

[vars]
config_dir = "{{ project_root }}/data/{{ instance_name }}"

[load.modules.postgres]
module_class = "database/postgres"

[load.modules.dragonfly]
module_class = "cache/dragonfly"

[load.services.kanidm]

[container]
name      = "{{ instance_name }}"
image     = "docker.io/umap/umap"
image_tag = "latest"
volumes   = [
    "{{ module_vars.config_dir }}/uploads:/srv/umap/uploads:Z",
    "{{ module_vars.config_dir }}/static:/srv/umap/static:Z",
    "{{ module_vars.config_dir }}/umap.conf:/etc/umap/umap.conf:ro,Z",
]

[container.healthcheck]
cmd          = "curl -fsS http://localhost:8000/ || exit 1"
interval     = "30s"
timeout      = "5s"
retries      = 3
start_period = "30s"

[environment]
SECRET_KEY            = "{{ vault_umap_secret_key }}"
SITE_URL              = "https://{{ service_domain }}"
SITE_NAME             = "{{ umap_site_name | default(project_domain + ' Maps') }}"

DATABASE_URL          = "postgis://{{ services.postgres.db_user }}:{{ services.postgres.vault_db_password }}@{{ services.postgres.container_name }}:{{ services.postgres.port }}/{{ services.postgres.db_name }}"

REDIS_URL             = "redis://:{{ services.dragonfly.vault_cache_password }}@{{ services.dragonfly.container_name }}:{{ services.dragonfly.port }}/0"

STATIC_ROOT           = "/srv/umap/static"
MEDIA_ROOT            = "/srv/umap/uploads"
REALTIME_ENABLED      = "{{ umap_realtime_enabled | default('true') }}"
UMAP_ALLOW_ANONYMOUS  = "{{ umap_allow_anonymous | default('true') }}"
DEBUG                 = "0"

[[variables]]
name        = "SECRET_KEY"
description = "Django secret key used for cryptographic signing of cookies and CSRF tokens. Auto-generated and stored in vault. Must be kept secret — rotating it will log out all users."
secret      = true
required    = true

[[variables]]
name        = "SITE_URL"
description = "Public HTTPS URL of the uMap instance (e.g. 'https://maps.example.com'). Used to build absolute URLs in shared map links and embeds."
required    = true

[[variables]]
name        = "SITE_NAME"
description = "Display name shown in the uMap header and page titles. Defaults to the project domain suffixed with 'Maps'."
default     = "<project_domain> Maps"

[[variables]]
name        = "DATABASE_URL"
description = "PostGIS connection URL (auto-derived from the postgres sub-service). Must use the 'postgis://' scheme — plain 'postgres://' will fail because uMap requires the PostGIS extension."
required    = true

[[variables]]
name        = "REDIS_URL"
description = "Redis connection URL (auto-derived from the dragonfly sub-service). Used for caching and Celery task queue. Database index 0 is reserved for uMap."
required    = true

[[variables]]
name        = "REALTIME_ENABLED"
description = "Enable real-time collaborative editing via WebSocket. 'true' allows multiple users to edit the same map simultaneously. Requires the WebSocket proxy route to be configured."
default     = "true"

[[variables]]
name        = "UMAP_ALLOW_ANONYMOUS"
description = "Allow users who are not logged in to create and edit maps. 'true' makes uMap fully public. Set to 'false' to require login via OIDC for all map creation."
default     = "true"

[[variables]]
name        = "DEBUG"
description = "Django debug mode. '0' = off (required for production). '1' enables the debug toolbar and detailed error pages — never enable in production as it leaks internal information."
required    = true
default     = "0"

[[setup.fields]]
key           = "vault_umap_secret_key"
label         = "uMap secret key"
field_type    = "secret"
auto_generate = true

[contract]
[[contract.routes]]
id          = "main"
path        = "/"
strip       = false
description = "uMap collaborative maps"
