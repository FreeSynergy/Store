# Module class definition – maps to modules/tasks/vikunja/vikunja.toml
#
# Field order (MANDATORY per RULES.md):
#   module → vars → load → container → environment → setup

[module]
name        = "vikunja"
alias       = ["tasks", "todo"]
type        = "tasks"
author      = "Kal El"
license      = "MIT"
version     = "0.0.1"
tags        = ["tasks", "project-management", "todo", "kanban"]
description = "Vikunja – open-source task management and to-do list app"
website     = "https://vikunja.io"
repository  = "https://kolaente.dev/vikunja/vikunja"
port        = 3456

health_path = "/api/v1/info"
health_port = 3456

[module.constraints]
per_host = 1
per_ip   = 1

[vars]
config_dir = "{{ project_root }}/data/{{ instance_name }}"

[load.modules.postgres]
module_class = "database/postgres"

[load.modules.dragonfly]
module_class = "cache/dragonfly"

[load.services.kanidm]
[load.services.stalwart]

[container]
name      = "{{ instance_name }}"
image     = "docker.io/vikunja/vikunja"
image_tag = "latest"
user      = "1000"
volumes   = [
    "{{ module_vars.config_dir }}/files:/app/vikunja/files:Z",
    "{{ module_vars.config_dir }}/config.yml:/etc/vikunja/config.yml:ro,Z",
]

[container.healthcheck]
cmd          = "curl -fsS http://localhost:3456/api/v1/info || exit 1"
interval     = "30s"
timeout      = "5s"
retries      = 3
start_period = "30s"

[environment]
VIKUNJA_SERVICE_PUBLICURL  = "https://{{ service_domain }}"
VIKUNJA_SERVICE_JWTSECRET  = "{{ vault_vikunja_jwt_secret }}"
VIKUNJA_SERVICE_TIMEZONE   = "{{ vikunja_timezone | default('Europe/Berlin') }}"

VIKUNJA_DATABASE_TYPE      = "postgres"
VIKUNJA_DATABASE_HOST      = "{{ services.postgres.container_name }}"
VIKUNJA_DATABASE_PORT      = "{{ services.postgres.port }}"
VIKUNJA_DATABASE_DATABASE  = "{{ vikunja_db_name | default('vikunja') }}"
VIKUNJA_DATABASE_USER      = "{{ vault_vikunja_db_user | default('vikunja') }}"
VIKUNJA_DATABASE_PASSWORD  = "{{ vault_vikunja_db_password }}"

VIKUNJA_REDIS_ENABLED      = "true"
VIKUNJA_REDIS_HOST         = "{{ services.dragonfly.container_name }}:{{ services.dragonfly.port }}"
VIKUNJA_REDIS_PASSWORD     = "{{ services.dragonfly.vault_cache_password }}"
VIKUNJA_REDIS_DB           = "{{ vikunja_redis_db | default('3') }}"

VIKUNJA_AUTH_LOCAL_ENABLED  = "{{ vikunja_local_auth | default('false') }}"
VIKUNJA_AUTH_OPENID_ENABLED = "true"

VIKUNJA_MAILER_ENABLED     = "{{ vikunja_mailer_enabled | default('true') }}"
VIKUNJA_MAILER_HOST        = "{{ services.stalwart.container_name | default('') }}"
VIKUNJA_MAILER_PORT        = "{{ vikunja_mailer_port | default('587') }}"
VIKUNJA_MAILER_USERNAME    = "{{ vault_vikunja_mailer_user | default('') }}"
VIKUNJA_MAILER_PASSWORD    = "{{ vault_vikunja_mailer_password | default('') }}"
VIKUNJA_MAILER_FROMEMAIL   = "{{ vikunja_mailer_from | default('tasks@' + project_domain) }}"

VIKUNJA_CORS_ENABLE        = "true"
VIKUNJA_CORS_ORIGINS       = "https://{{ service_domain }}"

VIKUNJA_LOG_LEVEL          = "{{ vikunja_log_level | default('INFO') }}"

[[variables]]
name        = "VIKUNJA_SERVICE_PUBLICURL"
description = "Public HTTPS URL of this Vikunja instance. Used to build links in email notifications and in the OpenAPI spec. Must match the proxy hostname."
required    = true

[[variables]]
name        = "VIKUNJA_SERVICE_JWTSECRET"
description = "Secret used to sign JWT authentication tokens. Auto-generated and stored in vault. Rotating this value will invalidate all active sessions and force users to log in again."
secret      = true
required    = true

[[variables]]
name        = "VIKUNJA_SERVICE_TIMEZONE"
description = "Timezone for due dates, reminders and recurring tasks. Accepts IANA timezone names (e.g. 'Europe/Berlin', 'America/New_York'). Should match the timezone of most users."
default     = "Europe/Berlin"

[[variables]]
name        = "VIKUNJA_DATABASE_DATABASE"
description = "Name of the PostgreSQL database to connect to. Defaults to 'vikunja'. Must match the database created on the Postgres sub-service."
default     = "vikunja"

[[variables]]
name        = "VIKUNJA_DATABASE_PASSWORD"
description = "Password for the Postgres database user. Auto-generated and stored in vault. Shared with the Postgres sub-service."
secret      = true
required    = true

[[variables]]
name        = "VIKUNJA_REDIS_DB"
description = "Redis database index for Vikunja's cache and queue. Default 3 avoids collisions with other services that share the same Dragonfly instance (Forgejo uses 0–2, Outline uses default)."
default     = "3"

[[variables]]
name        = "VIKUNJA_AUTH_LOCAL_ENABLED"
description = "Allow users to sign in with a username and password stored locally in Vikunja. 'false' forces all authentication through OIDC (Kanidm). Keep 'false' for SSO-only deployments."
default     = "false"

[[variables]]
name        = "VIKUNJA_MAILER_ENABLED"
description = "Enable email notifications for task reminders, due dates and team invitations. Requires SMTP host to be set. Set 'false' if no mail server is available."
default     = "true"

[[variables]]
name        = "VIKUNJA_MAILER_PORT"
description = "SMTP port for sending notifications. 587 = STARTTLS (recommended with Stalwart). 465 = implicit TLS. 25 = plain SMTP (insecure, only for localhost)."
default     = "587"

[[variables]]
name        = "VIKUNJA_MAILER_FROMEMAIL"
description = "Sender address for all outgoing Vikunja emails. Must be a valid address on the configured SMTP server. Displayed as 'From' in notification emails."
default     = "tasks@<project_domain>"

[[variables]]
name        = "VIKUNJA_CORS_ORIGINS"
description = "Allowed CORS origins for browser API calls. Should match the public URL. Multiple origins separated by commas. '*' would allow all origins — do not use in production."
required    = true

[[variables]]
name        = "VIKUNJA_LOG_LEVEL"
description = "Log verbosity. 'INFO' for production. 'DEBUG' for troubleshooting API or database issues. 'ERROR' reduces noise on high-traffic instances."
default     = "INFO"

[[setup.fields]]
key           = "vault_vikunja_jwt_secret"
label         = "Vikunja JWT secret"
field_type    = "secret"
auto_generate = true

[[setup.fields]]
key           = "vault_vikunja_db_password"
label         = "Vikunja database password"
field_type    = "secret"
auto_generate = true

[[setup.fields]]
key         = "vault_vikunja_mailer_password"
label       = "Vikunja SMTP password (optional)"
field_type  = "secret"
description = "SMTP password for sending notifications via Stalwart. Leave empty to disable mail."
skip_if_set = true

[contract]
[[contract.routes]]
id          = "main"
path        = "/"
strip       = false
description = "Vikunja task manager"
