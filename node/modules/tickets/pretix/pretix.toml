# Module class definition – maps to modules/tickets/pretix/pretix.toml
#
# Field order (MANDATORY per RULES.md):
#   module → vars → load → container → environment → setup
#
# NOTE: pretix requires a CUSTOM Docker image for plugins.
# Build before deploy: podman build -t fsn-pretix modules/tickets/pretix/

[module]
name        = "pretix"
alias       = ["tickets", "events"]
type        = "tickets"
author      = "Kal El"
license      = "MIT"
version     = "0.0.1"
tags        = ["tickets", "events", "registration", "shop"]
description = "pretix – ticket sales and event registration with plugins"
website     = "https://pretix.eu"
repository  = "https://github.com/pretix/pretix"
port        = 8000

health_path = "/healthcheck/"
health_port = 8000

[module.constraints]
per_host = 1
per_ip   = 1

[vars]
config_dir = "{{ project_root }}/data/{{ instance_name }}"
# Plugins to install (pip packages). Override in project file to add/remove.
pretix_plugins = [
    "pretix-oidc",
    "pretix-pages",
    "pretix-fontpack-free",
    "pretix-passbook",
]

[load.modules.postgres]
module_class = "database/postgres"

[load.modules.dragonfly]
module_class = "cache/dragonfly"

[load.services.kanidm]
[load.services.stalwart]

[container]
# Uses CUSTOM built image (not upstream directly)
name      = "{{ instance_name }}"
image     = "fsn-pretix"
image_tag = "latest"
user      = "15371:15371"
volumes   = [
    "{{ module_vars.config_dir }}/config:/etc/pretix:Z",
    "{{ module_vars.config_dir }}/data:/data:Z",
]

[container.healthcheck]
cmd          = "curl -fsS http://localhost:8000/healthcheck/ || exit 1"
interval     = "30s"
timeout      = "10s"
retries      = 3
start_period = "60s"

[environment]
PRETIX_PRETIX_INSTANCE_NAME = "{{ pretix_instance_name | default(project_domain + ' Tickets') }}"
PRETIX_PRETIX_URL           = "https://{{ service_domain }}"
PRETIX_PRETIX_CURRENCY      = "{{ pretix_currency | default('EUR') }}"
PRETIX_PRETIX_LOGLEVEL      = "{{ pretix_log_level | default('INFO') }}"

PRETIX_LOCALE_DEFAULT       = "{{ pretix_locale | default('de') }}"
PRETIX_LOCALE_TIMEZONE      = "{{ pretix_timezone | default('Europe/Berlin') }}"
PRETIX_LANGUAGES_ENABLED    = "{{ pretix_languages | default('de,en') }}"

PRETIX_DATABASE_BACKEND     = "postgresql"
PRETIX_DATABASE_HOST        = "{{ services.postgres.container_name }}"
PRETIX_DATABASE_PORT        = "{{ services.postgres.port }}"
PRETIX_DATABASE_NAME        = "{{ pretix_db_name | default('pretix') }}"
PRETIX_DATABASE_USER        = "{{ services.postgres.db_user }}"
PRETIX_DATABASE_PASSWORD    = "{{ services.postgres.vault_db_password }}"

PRETIX_REDIS_LOCATION       = "redis://:{{ services.dragonfly.vault_cache_password }}@{{ services.dragonfly.container_name }}:{{ services.dragonfly.port }}/4"
PRETIX_REDIS_SESSIONS       = "true"

PRETIX_CELERY_BROKER        = "redis://:{{ services.dragonfly.vault_cache_password }}@{{ services.dragonfly.container_name }}:{{ services.dragonfly.port }}/5"
PRETIX_CELERY_BACKEND       = "redis://:{{ services.dragonfly.vault_cache_password }}@{{ services.dragonfly.container_name }}:{{ services.dragonfly.port }}/6"

PRETIX_MAIL_HOST            = "{{ services.stalwart.container_name | default('') }}"
PRETIX_MAIL_PORT            = "{{ pretix_mail_port | default('587') }}"
PRETIX_MAIL_USER            = "{{ vault_pretix_mail_user | default('') }}"
PRETIX_MAIL_PASSWORD        = "{{ vault_pretix_mail_password | default('') }}"
PRETIX_MAIL_FROM            = "{{ pretix_mail_from | default('tickets@' + project_domain) }}"
PRETIX_MAIL_TLS             = "{{ pretix_mail_tls | default('on') }}"

PRETIX_DATA_DIR             = "/data"
AUTOMIGRATE                 = "{{ pretix_automigrate | default('yes') }}"

[[setup.fields]]
key         = "vault_pretix_mail_user"
label       = "Pretix SMTP username (optional)"
field_type  = "string"
description = "SMTP username for sending order confirmations. Leave empty to disable mail."
skip_if_set = true

[[setup.fields]]
key         = "vault_pretix_mail_password"
label       = "Pretix SMTP password (optional)"
field_type  = "secret"
description = "SMTP password for sending order confirmations. Leave empty to disable mail."
skip_if_set = true

[contract]
[[contract.routes]]
id          = "main"
path        = "/"
strip       = false
description = "Pretix ticket shop"
