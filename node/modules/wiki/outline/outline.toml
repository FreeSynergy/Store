[module]
name        = "outline"
alias       = ["wiki"]
type        = "wiki"
author      = "Kal El"
license      = "MIT"
version     = "0.0.1"
tags        = ["wiki", "knowledge", "docs"]
description = "Outline collaborative wiki and knowledge base"
website     = "https://www.getoutline.com"
repository  = "https://github.com/outline/outline"
port        = 3000
health_path = "/_health"
health_port = 3000

[module.constraints]

[module.federation]
enabled   = true
min_trust = 2

[vars]
config_dir = "{{ project_root }}/data/{{ instance_name }}"

[load.modules.postgres]
module_class = "database/postgres"

[load.services.kanidm]
[load.services.cache]

[container]
name      = "{{ instance_name }}"
image     = "docker.getoutline.com/outlinewiki/outline"
image_tag = "latest"
volumes   = ["{{ module_vars.config_dir }}/data:/var/lib/outline/data:Z"]

[container.healthcheck]
cmd          = "curl -fsS http://localhost:3000/_health || exit 1"
interval     = "30s"
timeout      = "5s"
retries      = 3
start_period = "30s"

[environment]
NODE_ENV                      = "production"
URL                           = "https://{{ service_domain }}"
PORT                          = "{{ module.port }}"
SECRET_KEY                    = "{{ vault_outline_secret_key }}"
UTILS_SECRET                  = "{{ vault_outline_utils_secret }}"
DATABASE_URL                  = "postgres://{{ services.postgres.db_user }}:{{ services.postgres.vault_db_password }}@{{ services.postgres.container_name }}:{{ services.postgres.port }}/{{ services.postgres.db_name }}"
DATABASE_CONNECTION_POOL_MIN  = "{{ outline_db_pool_min | default('') }}"
DATABASE_CONNECTION_POOL_MAX  = "{{ outline_db_pool_max | default('') }}"
PGSSLMODE                     = "disable"
REDIS_URL                     = "redis://:{{ services.cache.vault_cache_password }}@{{ services.cache.container_name }}:{{ services.cache.port }}"
OIDC_CLIENT_ID                = "{{ vault_outline_oidc_client_id | default('outline') }}"
OIDC_CLIENT_SECRET            = "{{ vault_outline_oidc_client_secret }}"
OIDC_AUTH_URI                 = "https://{{ services.kanidm.domain }}/ui/oauth2"
OIDC_TOKEN_URI                = "https://{{ services.kanidm.domain }}/oauth2/token"
OIDC_USERINFO_URI             = "https://{{ services.kanidm.domain }}/oauth2/openid/outline/userinfo"
OIDC_LOGOUT_URI               = "https://{{ services.kanidm.domain }}/ui/logout"
OIDC_USERNAME_CLAIM           = "preferred_username"
OIDC_DISPLAY_NAME             = "{{ outline_oidc_display_name | default('Login') }}"
OIDC_SCOPES                   = "openid profile email"
FILE_STORAGE                  = "local"
FILE_STORAGE_LOCAL_ROOT_DIR   = "/var/lib/outline/data"
FILE_STORAGE_UPLOAD_MAX_SIZE  = "{{ outline_upload_max_size | default('262144000') }}"
SMTP_HOST                     = "{{ outline_smtp_host | default('') }}"
SMTP_PORT                     = "{{ outline_smtp_port | default('') }}"
SMTP_USERNAME                 = "{{ outline_smtp_user | default('') }}"
SMTP_PASSWORD                 = "{{ vault_outline_smtp_password | default('') }}"
SMTP_FROM_EMAIL               = "{{ outline_smtp_from | default('') }}"
SMTP_REPLY_EMAIL              = "{{ outline_smtp_reply | default('') }}"
SMTP_SECURE                   = "{{ outline_smtp_secure | default('true') }}"
FORCE_HTTPS                   = "true"
ENABLE_UPDATES                = "false"
DEFAULT_LANGUAGE              = "{{ outline_language | default('en_US') }}"
LOG_LEVEL                     = "{{ log_level | default('info') }}"

[[variables]]
name        = "NODE_ENV"
description = "Node.js runtime environment. Must be 'production' for all deployed instances — this enables minification, disables debug tooling and activates security headers."
required    = true
default     = "production"

[[variables]]
name        = "URL"
description = "Full public HTTPS URL of this Outline instance. Used to build links in email notifications and for CORS. Must match the proxy hostname exactly."
required    = true

[[variables]]
name        = "SECRET_KEY"
description = "Cryptographic secret for signing cookies and tokens. Must be at least 32 characters. Auto-generated and stored in vault. Rotating this value will invalidate all active sessions."
secret      = true
required    = true

[[variables]]
name        = "UTILS_SECRET"
description = "Second secret key used for internal utility operations (e.g. file export signing). Auto-generated and stored in vault. Keep separate from SECRET_KEY."
secret      = true
required    = true

[[variables]]
name        = "DATABASE_CONNECTION_POOL_MIN"
description = "Minimum number of idle Postgres connections kept open. Empty = use Outline's default (1). Increase on high-traffic instances to reduce connection setup latency."
default     = ""

[[variables]]
name        = "DATABASE_CONNECTION_POOL_MAX"
description = "Maximum number of Postgres connections the pool may open. Empty = use Outline's default (5). Increase on high-traffic instances; must not exceed Postgres's max_connections limit."
default     = ""

[[variables]]
name        = "PGSSLMODE"
description = "PostgreSQL SSL mode. 'disable' is correct when Postgres runs in the same Podman network. Use 'require' or 'verify-full' only when connecting to an external database."
required    = true
default     = "disable"

[[variables]]
name        = "OIDC_CLIENT_ID"
description = "OAuth2 client ID registered in Kanidm for Outline. Default 'outline' matches the Kanidm setup guide. Change only if you registered the client under a different name."
default     = "outline"

[[variables]]
name        = "OIDC_CLIENT_SECRET"
description = "OAuth2 client secret from Kanidm. Create an OAuth2 client named 'outline' in Kanidm and paste the generated secret here."
secret      = true
required    = true

[[variables]]
name        = "OIDC_USERNAME_CLAIM"
description = "OIDC claim used as the Outline username. 'preferred_username' maps to the Kanidm username. Use 'email' if you prefer email addresses as usernames."
default     = "preferred_username"

[[variables]]
name        = "OIDC_DISPLAY_NAME"
description = "Label shown on the 'Sign in with …' button on the Outline login page. Short and recognizable: 'Login', 'Kanidm', or your organization name."
default     = "Login"

[[variables]]
name        = "OIDC_SCOPES"
description = "OAuth2 scopes to request from Kanidm. 'openid profile email' is the minimum for Outline to identify users and send notifications."
default     = "openid profile email"

[[variables]]
name        = "FILE_STORAGE"
description = "Backend for uploaded files and images. 'local' stores files in FILE_STORAGE_LOCAL_ROOT_DIR on the volume. Alternative: 's3' for object storage (requires additional S3 vars)."
required    = true
default     = "local"

[[variables]]
name        = "FILE_STORAGE_UPLOAD_MAX_SIZE"
description = "Maximum allowed upload file size in bytes. Default 262144000 = 250 MB. Increase for teams that share large files; decrease to conserve disk space."
default     = "262144000"

[[variables]]
name        = "SMTP_HOST"
description = "Hostname of the SMTP server for sending invitation emails and notifications. When using Stalwart, this is its container name. Leave empty to disable email."
default     = ""

[[variables]]
name        = "SMTP_PORT"
description = "SMTP port. 587 = STARTTLS (recommended with Stalwart). 465 = implicit TLS. Leave empty when SMTP_HOST is empty."
default     = ""

[[variables]]
name        = "SMTP_FROM_EMAIL"
description = "Sender address for Outline notifications and invitations. Must be a valid address accepted by the SMTP server."
default     = ""

[[variables]]
name        = "SMTP_REPLY_EMAIL"
description = "Reply-To address for Outline emails. Users who reply to a notification will reach this address. Can differ from SMTP_FROM_EMAIL."
default     = ""

[[variables]]
name        = "SMTP_SECURE"
description = "'true' = require TLS (implicit or STARTTLS). 'false' = allow plaintext. Always 'true' in production."
default     = "true"

[[variables]]
name        = "SMTP_PASSWORD"
description = "SMTP password for authenticating with the mail server. Stored in vault. Leave empty when mail is disabled."
secret      = true
default     = ""

[[variables]]
name        = "DEFAULT_LANGUAGE"
description = "Default UI language for new users. Accepts locale codes like 'en_US', 'de_DE', 'fr_FR'. Users can override this in their profile settings."
default     = "en_US"

[[variables]]
name        = "LOG_LEVEL"
description = "Log verbosity. 'info' for production. 'debug' for troubleshooting OIDC or database issues. 'error' for minimal logging on stable instances."
default     = "info"

[[setup.fields]]
key           = "vault_outline_secret_key"
label         = "Outline secret key (32+ chars)"
field_type    = "secret"
auto_generate = true

[[setup.fields]]
key           = "vault_outline_utils_secret"
label         = "Outline utils secret (32+ chars)"
field_type    = "secret"
auto_generate = true

[[setup.fields]]
key         = "vault_outline_oidc_client_secret"
label       = "Outline OIDC client secret (from Kanidm)"
field_type  = "secret"
description = "Create an OAuth2 client 'outline' in Kanidm and paste the client secret here"

[[setup.fields]]
key         = "vault_outline_smtp_password"
label       = "Outline SMTP password (optional)"
field_type  = "secret"
skip_if_set = true

[contract]
[[contract.routes]]
id          = "main"
path        = "/"
strip       = false
description = "Outline wiki"
