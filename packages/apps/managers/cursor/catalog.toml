# FreeSynergy Manager — Cursor

[package]
id               = "managers.cursor"
name             = "Cursor Manager"
type             = "app"
version          = "0.1.0"
summary          = "Install cursor themes and activate them platform-wide"
description      = "The Cursor Manager installs cursor themes from the Store and activates them across the platform. Switch between cursor styles without restart."
description_file = "i18n/en/description.ftl"
icon             = "icon.svg"
tags             = ["cursor", "appearance", "managers"]
author           = "FreeSynergy"
license          = "MIT"

[package.origin]
git       = "https://github.com/FreeSynergy/fs-managers"
publisher = "FreeSynergy"

[source]
type     = "github_release"
repo     = "FreeSynergy/fs-managers"
artifact = "fs-manager-cursor-x86_64-unknown-linux-gnu.tar.gz"

[distribution]
linux-x86_64   = "https://github.com/FreeSynergy/fs-managers/releases/download/v{version}/fs-manager-cursor-x86_64-linux.tar.gz"
linux-aarch64  = "https://github.com/FreeSynergy/fs-managers/releases/download/v{version}/fs-manager-cursor-aarch64-linux.tar.gz"
macos-x86_64   = "https://github.com/FreeSynergy/fs-managers/releases/download/v{version}/fs-manager-cursor-x86_64-macos.tar.gz"
macos-aarch64  = "https://github.com/FreeSynergy/fs-managers/releases/download/v{version}/fs-manager-cursor-aarch64-macos.tar.gz"
windows-x86_64 = "https://github.com/FreeSynergy/fs-managers/releases/download/v{version}/fs-manager-cursor-x86_64-windows.zip"

[app]
data_dir   = "{data_root}/managers/cursor"
config_dir = "{config_root}/managers/cursor"

[[binaries]]
name   = "fs-manager-cursor"
binary = "fs-manager-cursor"

[provides]
capabilities = []
bus_messages = []
