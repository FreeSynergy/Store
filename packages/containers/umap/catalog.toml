# uMap — Self-Hosted Map Editor

[package]
id               = "umap"
name             = "uMap"
type             = "container"
version          = "3.2.0"
summary          = "Self-hosted map editor — create, customize, and share OpenStreetMap-based maps"
description      = "uMap lets you create, customize, and share maps using OpenStreetMap tile layers. It supports markers, lines, polygons, popups with rich content, and multiple sharing modes. Useful for displaying data on a map without relying on proprietary map services."
description_file = "help/en/description.ftl"
icon             = "icon.svg"
tags             = ["maps", "openstreetmap", "gis", "geospatial", "visualization"]
author           = "uMap contributors"
license          = "WTFPL"

[package.origin]
website   = "https://umap-project.org"
git       = "https://github.com/umap-project/umap"
publisher = "uMap contributors"

[provides]
capabilities = ["map-editor", "geospatial"]

[contract]
upstream_tls = false

[[contract.routes]]
id          = "main"
path        = "/"
strip       = false
description = "uMap web editor and map viewer"
