# FreeSynergy Store — Languages Namespace
#
# Language packages contain shared Mozilla Fluent translation snippets used across all programs:
# actions (save, cancel, delete), labels, status messages, confirmations, time expressions.
#
# Each package contains:
#   - catalog.toml          — package metadata (name, locale, direction, coverage, snippets_dir)
#   - icon.svg              — language/flag icon
#   - i18n/en/description.ftl — Store description of this language pack (English)
#   - i18n/de/description.ftl — Store description of this language pack (German)
#   - snippets/             — translation snippet files (the actual package content):
#       actions.toml        — verb actions (save, cancel, delete, ...)
#       labels.toml         — UI labels and headings
#       nouns.toml          — common nouns (file, user, package, ...)
#       errors.toml         — error messages
#       confirmations.toml  — confirmation dialogs
#       notifications.toml  — system notifications
#       phrases.toml        — common phrases and sentences
#       status.toml         — status strings (running, stopped, pending, ...)
#       time.toml           — time and date expressions
#       validation.toml     — form validation messages
#       help.toml           — general help text snippets

[catalog]
id      = "i18n"
name    = "Languages"
icon    = "icon.svg"
summary = "Shared language snippets — common UI strings used across all FreeSynergy programs"

