# Español Language Pack

[package]
id           = "es"
name         = "Español"
type         = "language"
version      = "1.1.0"
summary      = "Español (es-ES) language pack for FreeSynergy"
description  = "Español language pack for FreeSynergy. Provides UI translations for the desktop shell, all built-in applications, and Store descriptions."
icon         = "icon.svg"
description_file = "i18n/en/description.ftl"
tags         = ["language", "i18n", "es"]
author       = "FreeSynergy"
license      = "Apache-2.0"

[language]
snippets_dir = "snippets"
locale       = "es-ES"
name_native  = "Español"
