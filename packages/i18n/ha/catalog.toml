# Hausa Language Pack

[package]
id           = "ha"
name         = "Hausa"
type         = "language"
version      = "1.1.0"
summary      = "Hausa (ha-NG) language pack for FreeSynergy"
description  = "Hausa language pack for FreeSynergy. Provides UI translations for the desktop shell, all built-in applications, and Store descriptions."
icon         = "icon.svg"
description_file = "i18n/en/description.ftl"
tags         = ["language", "i18n", "ha"]
author       = "FreeSynergy"
license      = "Apache-2.0"

[language]
snippets_dir = "snippets"
locale       = "ha-NG"
name_native  = "Hausa"
