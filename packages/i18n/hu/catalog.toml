# Magyar Language Pack

[package]
id           = "hu"
name         = "Magyar"
type         = "language"
version      = "1.1.0"
summary      = "Magyar (hu-HU) language pack for FreeSynergy"
description  = "Magyar language pack for FreeSynergy. Provides UI translations for the desktop shell, all built-in applications, and Store descriptions."
icon         = "icon.svg"
description_file = "i18n/en/description.ftl"
tags         = ["language", "i18n", "hu"]
author       = "FreeSynergy"
license      = "Apache-2.0"

[language]
snippets_dir = "snippets"
locale       = "hu-HU"
name_native  = "Magyar"
direction    = "ltr"
coverage     = 100
family       = "Uralic"
continent    = "Europe"
