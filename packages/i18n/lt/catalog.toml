# Lietuvių Language Pack

[package]
id           = "lt"
name         = "Lietuvių"
type         = "language"
version      = "1.1.0"
summary      = "Lietuvių (lt-LT) language pack for FreeSynergy"
description  = "Lietuvių language pack for FreeSynergy. Provides UI translations for the desktop shell, all built-in applications, and Store descriptions."
icon         = "icon.svg"
description_file = "i18n/en/description.ftl"
tags         = ["language", "i18n", "lt"]
author       = "FreeSynergy"
license      = "Apache-2.0"

[language]
snippets_dir = "snippets"
locale       = "lt-LT"
name_native  = "Lietuvių"
direction    = "ltr"
coverage     = 100
family       = "Indo-European"
continent    = "Europe"
