# Nederlands Language Pack

[package]
id           = "nl"
name         = "Nederlands"
type         = "language"
version      = "1.1.0"
summary      = "Nederlands (nl-NL) language pack for FreeSynergy"
description  = "Nederlands language pack for FreeSynergy. Provides UI translations for the desktop shell, all built-in applications, and Store descriptions."
icon         = "icon.svg"
description_file = "i18n/en/description.ftl"
tags         = ["language", "i18n", "nl"]
author       = "FreeSynergy"
license      = "Apache-2.0"

[language]
snippets_dir = "snippets"
locale       = "nl-NL"
name_native  = "Nederlands"
direction    = "ltr"
coverage     = 100
family       = "Indo-European"
continent    = "Europe"
