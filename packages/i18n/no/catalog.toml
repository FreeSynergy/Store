# Norsk Language Pack

[package]
id           = "no"
name         = "Norsk"
type         = "language"
version      = "1.1.0"
summary      = "Norsk (no-NO) language pack for FreeSynergy"
description  = "Norsk language pack for FreeSynergy. Provides UI translations for the desktop shell, all built-in applications, and Store descriptions."
icon         = "icon.svg"
description_file = "i18n/en/description.ftl"
tags         = ["language", "i18n", "no"]
author       = "FreeSynergy"
license      = "Apache-2.0"

[language]
snippets_dir = "snippets"
locale       = "no-NO"
name_native  = "Norsk"
direction    = "ltr"
coverage     = 100
family       = "Indo-European"
continent    = "Europe"
