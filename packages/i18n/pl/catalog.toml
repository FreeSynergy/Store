# Polski Language Pack

[package]
id           = "pl"
name         = "Polski"
type         = "language"
version      = "1.1.0"
summary      = "Polski (pl-PL) language pack for FreeSynergy"
description  = "Polski language pack for FreeSynergy. Provides UI translations for the desktop shell, all built-in applications, and Store descriptions."
icon         = "icon.svg"
description_file = "i18n/en/description.ftl"
tags         = ["language", "i18n", "pl"]
author       = "FreeSynergy"
license      = "Apache-2.0"

[language]
snippets_dir = "snippets"
locale       = "pl-PL"
name_native  = "Polski"
direction    = "ltr"
coverage     = 100
family       = "Indo-European"
continent    = "Europe"
