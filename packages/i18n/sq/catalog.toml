# Shqip Language Pack

[package]
id           = "sq"
name         = "Shqip"
type         = "language"
version      = "1.1.0"
summary      = "Shqip (sq-AL) language pack for FreeSynergy"
description  = "Shqip language pack for FreeSynergy. Provides UI translations for the desktop shell, all built-in applications, and Store descriptions."
icon         = "icon.svg"
description_file = "i18n/en/description.ftl"
tags         = ["language", "i18n", "sq"]
author       = "FreeSynergy"
license      = "Apache-2.0"

[language]
snippets_dir = "snippets"
locale       = "sq-AL"
name_native  = "Shqip"
direction    = "ltr"
coverage     = 100
family       = "Indo-European"
continent    = "Europe"
