# Türkçe Language Pack

[package]
id           = "tr"
name         = "Türkçe"
type         = "language"
version      = "1.1.0"
summary      = "Türkçe (tr-TR) language pack for FreeSynergy"
description  = "Türkçe language pack for FreeSynergy. Provides UI translations for the desktop shell, all built-in applications, and Store descriptions."
icon         = "icon.svg"
description_file = "i18n/en/description.ftl"
tags         = ["language", "i18n", "tr"]
author       = "FreeSynergy"
license      = "Apache-2.0"

[language]
snippets_dir = "snippets"
locale       = "tr-TR"
name_native  = "Türkçe"
direction    = "ltr"
coverage     = 100
family       = "Turkic"
continent    = "Asia"
