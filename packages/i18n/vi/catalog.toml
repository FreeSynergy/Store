# Tiếng Việt Language Pack

[package]
id           = "vi"
name         = "Tiếng Việt"
type         = "language"
version      = "1.1.0"
summary      = "Tiếng Việt (vi-VN) language pack for FreeSynergy"
description  = "Tiếng Việt language pack for FreeSynergy. Provides UI translations for the desktop shell, all built-in applications, and Store descriptions."
icon         = "icon.svg"
description_file = "i18n/en/description.ftl"
tags         = ["language", "i18n", "vi"]
author       = "FreeSynergy"
license      = "Apache-2.0"

[language]
snippets_dir = "snippets"
locale       = "vi-VN"
name_native  = "Tiếng Việt"
direction    = "ltr"
coverage     = 100
family       = "Austroasiatic"
continent    = "Asia"
