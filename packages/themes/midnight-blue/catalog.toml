# Midnight Blue Theme

[package]
id               = "midnight-blue"
name             = "Midnight Blue"
type             = "theme"
version          = "1.0.0"
summary          = "Dark blue desktop theme — deep navy tones with cyan accent, by KalEl"
description      = "Midnight Blue is the default FreeSynergy desktop theme. It uses deep navy and dark blue tones with a cyan accent color, white text, and subtle glass-effect panels. Designed for long work sessions in dimly lit environments."
description_file = "i18n/en/description.ftl"
icon             = "icon.svg"
tags             = ["theme", "dark", "blue", "navy", "cyan", "default"]
author           = "KalEl / FreeSynergy"
license          = "MIT"

[provides]
capabilities = ["theme"]

# Color variables — applied platform-wide (each program prefixes with --fs-)
[colors]
# Backgrounds
bg_base     = "#0f172a"
bg_surface  = "#1e293b"
bg_elevated = "#293548"
bg_card     = "#1e293b"
bg_input    = "#1e293b"

# Text
text_primary   = "#f1f5f9"
text_secondary = "#94a3b8"
text_muted     = "#64748b"

# Accent — Cyan (FreeSynergy brand color)
primary       = "#00bcd4"
primary_hover = "#00acc1"
primary_text  = "#ffffff"
accent        = "#06b6d4"

# Semantic
success = "#10b981"
warning = "#f59e0b"
error   = "#ef4444"

# Borders
border       = "#334155"
border_focus = "#00bcd4"
