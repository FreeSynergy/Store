# Clock Widget

[package]
id               = "clock"
name             = "Clock"
type             = "widget"
version          = "0.1.0"
summary          = "Analog and digital clock widget — live time display for the FreeSynergy desktop"
description      = "A configurable clock widget that displays the current time in analog or digital format. Supports multiple time zones, 12/24-hour format, and custom colors via the active theme."
description_file = "en/description.ftl"
icon             = "icon.svg"
tags             = ["clock", "time", "widget", "desktop"]
author           = "FreeSynergy"
license          = "MIT"

[widget]
min_size = { cols = 2, rows = 1 }
max_size = { cols = 4, rows = 2 }

[[variables]]
name       = "CLOCK_FORMAT"
label      = "Format"
description = "Display format: 'analog', 'digital-12', or 'digital-24'."
default    = "digital-24"

[[variables]]
name       = "CLOCK_TIMEZONE"
label      = "Time Zone"
description = "IANA time zone (e.g. Europe/Vienna). Empty means system default."
default    = ""
