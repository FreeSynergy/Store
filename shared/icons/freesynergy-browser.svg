<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="18" fill="#0D1117"/>
  <!-- Browser window frame -->
  <rect x="10" y="18" width="80" height="64" rx="5" fill="none" stroke="#00BCD4" stroke-width="4"/>
  <!-- URL bar -->
  <rect x="18" y="27" width="64" height="10" rx="3" fill="#00BCD4" opacity="0.2" stroke="#00BCD4" stroke-width="1.5"/>
  <!-- Globe / earth circle -->
  <circle cx="50" cy="58" r="18" fill="none" stroke="#00BCD4" stroke-width="3"/>
  <!-- Latitude lines -->
  <path d="M32 58 Q50 50 68 58" fill="none" stroke="#00BCD4" stroke-width="1.8" opacity="0.6"/>
  <path d="M32 58 Q50 66 68 58" fill="none" stroke="#00BCD4" stroke-width="1.8" opacity="0.6"/>
  <!-- Vertical center line -->
  <line x1="50" y1="40" x2="50" y2="76" stroke="#00BCD4" stroke-width="1.8" opacity="0.6"/>
</svg>
