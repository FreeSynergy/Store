# FreeSynergy Store — Themes
#
# Themes live at the Store root (not under packages/).
# A theme is a Bundle subtype with a fixed structure:
# color scheme, style, icon set, font set, cursor set,
# button style, window chrome, and animation set.

[catalog]
id      = "themes"
name    = "Themes"
icon    = "icon.svg"
summary = "Visual themes for the FreeSynergy desktop"

[[packages]]
id      = "midnight-blue"
catalog = "midnight-blue/catalog.toml"

[[packages]]
id      = "nordic-dark"
catalog = "nordic-dark/catalog.toml"

[[packages]]
id      = "cloud-white"
catalog = "cloud-white/catalog.toml"
