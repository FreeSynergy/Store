# Cloud White Theme

[package]
id               = "cloud-white"
name             = "Cloud White"
type             = "theme"
version          = "0.1.0"
summary          = "Clean light desktop theme — bright white with sky blue accents"
description      = "Cloud White is a clean, bright light theme for the FreeSynergy desktop. It uses white and light gray backgrounds with sky blue accents and dark charcoal text. Designed for well-lit environments and users who prefer light mode."
description_file = "help/en/description.ftl"
icon             = "preview.svg"
tags             = ["theme", "light", "white", "bright", "blue", "clean"]
author           = "FreeSynergy"
license          = "MIT"

[provides]
capabilities = ["theme"]

[bundle]
components = [
    { type = "color_scheme", file = "cloud-white.css" },
    { type = "style",        file = "style.css" },
]
