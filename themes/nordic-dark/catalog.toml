# Nordic Dark Theme

[package]
id               = "nordic-dark"
name             = "Nordic Dark"
type             = "theme"
version          = "0.1.0"
summary          = "Nordic-inspired dark theme — muted arctic tones with a cool gray palette"
description      = "Nordic Dark is inspired by the popular Nord color palette — muted arctic blues, cool grays, and soft teal accents. A calm and focused dark theme with lower contrast than Midnight Blue."
description_file = "help/en/description.ftl"
icon             = "preview.svg"
tags             = ["theme", "dark", "nordic", "nord", "gray", "arctic"]
author           = "FreeSynergy"
license          = "MIT"

[provides]
capabilities = ["theme"]

[bundle]
components = [
    { type = "color_scheme", file = "nordic-dark.css" },
    { type = "style",        file = "style.css" },
]
